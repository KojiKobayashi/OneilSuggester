name: Daily Stock Scan

on:
  schedule:
    # Run every day at UTC 21:00 (= JST 06:00 the next morning)
    - cron: '0 21 * * *'
  workflow_dispatch:   # allow manual runs from the GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Update stock list
        run: uv run python batch/update_stock_list.py

      - name: Run daily batch
        run: uv run python batch/run_daily.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock_list.csv docs/data/
          # Only commit when there are actual changes
          git diff --cached --quiet || git commit -m "chore: update stock list and scan results [skip ci]"
          git push
